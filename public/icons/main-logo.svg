<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 110" width="100%" height="100%">
  <!-- Icon: Abstract Transport Truck & Speed Lanes -->
  <g transform="translate(15, 15)">
    <!-- Road/Speed Lines beneath the vehicle -->
    <path d="M5 65 L75 65 M15 72 L65 72" stroke="#F97316" stroke-width="3" stroke-linecap="round" />
    
    <!-- Abstract Truck Grid Profile -->
    <path d="M20 55 L20 30 L38 12 L62 12 L62 55 Z" fill="#1E293B" />
    <!-- Windshield / Aerodynamic Angle -->
    <path d="M42 16 L58 16 L58 32 L34 32 Z" fill="#F97316" />
    <!-- Front Grill / Motion Bars -->
    <rect x="25" y="38" width="6" height="12" rx="1" fill="#FFFFFF" />
    <rect x="35" y="38" width="6" height="12" rx="1" fill="#FFFFFF" />
    <rect x="45" y="38" width="6" height="12" rx="1" fill="#FFFFFF" />
  </g>

  <!-- Typography -->
  <text x="105" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="900" fill="#1E293B" letter-spacing="-1.5">Trans</text>
  <text x="228" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="300" fill="#F97316" letter-spacing="-0.5">Logix</text>
  
  <!-- System Tagline -->
  <text x="107" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#64748B" letter-spacing="4">TRANSPORT MANAGEMENT SYSTEM</text>
</svg>
